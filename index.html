<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dana Family Day 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --gold: #ffd700; --bg: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e293b; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-bottom: 15px; border: 1px solid #334155; }
        .promo-banner { background: linear-gradient(135deg, #f59e0b, #b45309); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .info-box { font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-top: 10px; text-align: left; }

        .badge-item.active { opacity: 1; }

        .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 10px; }

        .paid { background: #22c55e; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        .btn-wa { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="promo-banner">
        <h3 style="margin:0">🎁 HADIAH MISTERI MENANTI!</h3>
        <div style="font-size: 0.8rem; margin-top:5px;">Target: <b>RM 550</b></div>
        <div class="info-box"><b>Cara Menang:</b> BAYARAN PALING AWAL HABIS ATAU BAYAR LEBIH.</div>
    </div>

    <div class="card carousel" id="rewardCarousel">
        <div class="badge-item active">
            <div class="big-icon">👑</div>
            <div id="top-fam" style="font-weight:bold; font-size: 0.9rem;">Memuatkan Juara...</div>
        </div>
        <div class="badge-item">
            <div class="big-icon">💎</div>
            <div style="font-weight:bold; font-size: 0.9rem;">VIP SUPPORTER - Pilihan Utama</div>
        </div>
    </div>

    <h2 style="text-align:center; color: var(--gold);">👑 RANKING BAYARAN TERTINGGI</h2>
    <div id="leaderboard"></div>

    <button class="btn-wa" onclick="window.location.href='https://wa.me/601164349453'">BAYAR SEKARANG</button>

    <div class="card" style="margin-top:15px">
        <h3>🔐 Panel Bendahari</h3>
        <input type="password" id="pass" style="padding:8px; width:40%; border-radius:5px;">
        <button onclick="checkAdmin()" style="padding:8px;">Masuk</button>
        <div id="admin-panel" style="display:none; margin-top:10px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCSRS7lhcUzTnY_TlD9QWIWR5V-iNorDgI", authDomain: "familyday2026-97427.firebaseapp.com", projectId: "familyday2026-97427", storageBucket: "familyday2026-97427.firebasestorage.app", messagingSenderId: "639288774565", appId: "1:639288774565:web:9c344bd84c520c47cf224c" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ogo", "Sep", "Okt", "Nov"];

    // Animasi Carousel
    setInterval(() => {
        const items = document.querySelectorAll('.badge-item');
        let idx = 0;
        items.forEach((item, i) => { if(item.classList.contains('active')) idx = i; item.classList.remove('active'); });
        idx = (idx + 1) % items.length;
        items[idx].classList.add('active');
    }, 3000);

    // Paparan Data
    db.collection("kutipan_keluarga").doc("status_bayaran").onSnapshot((doc) => {
        const data = doc.data() || {};
        const families = Object.keys(data).filter(k => k !== "AVATARS" && k !== "HISTORY");
        const avatars = data.AVATARS || {};
        const history = data.HISTORY || {};
        
        families.sort((a, b) => (data[b] || 0) - (data[a] || 0));

        document.getElementById('leaderboard').innerHTML = families.map(f => `
            <div class="card">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${avatars[f] || 'https://via.placeholder.com/40'}" class="avatar">
                    <div style="flex:1"><b>${f.replace(/_/g, ' ')}</b></div>
                    <div style="color:var(--gold); font-weight:bold;">RM ${data[f] || 0}</div>
                </div>
                <div class="month-grid">
                    ${months.map((m, i) => `<div class="month-box ${(history[f] && history[f][i]) ? 'paid' : ''}">${m}</div>`).join('')}
                </div>
            </div>`).join('');
        
        document.getElementById('top-fam').innerText = "JUARA: " + families[0].replace(/_/g,' ') + " (RM " + (data[families[0]] || 0) + ")";
    });

    async function checkAdmin() {
        if(document.getElementById('pass').value === "FamilyDay2026") {
            const snap = await db.collection("kutipan_keluarga").doc("status_bayaran").get();
            const fams = Object.keys(snap.data()).filter(k => k !== "AVATARS" && k !== "HISTORY");
            document.getElementById('admin-panel').style.display = "block";
            document.getElementById('admin-panel').innerHTML = fams.map(f => `<button onclick="toggleMonth('${f}')" style="margin:2px;">Edit ${f.replace(/_/g,' ')}</button>`).join('');
        } else { alert("Kod Salah!"); }
    }

    async function toggleMonth(fam) {
        const docRef = db.collection("kutipan_keluarga").doc("status_bayaran");
        const doc = await docRef.get();
        let h = doc.data().HISTORY;
        const m = prompt("Masukkan bulan (1-11, 1=Jan):") - 1;
        if(m >= 0 && m <= 10) {
            h[fam][m] = !h[fam][m];
            const total = h[fam].filter(v => v === true).length * 50;
            await docRef.update({ [`HISTORY.${fam}`]: h[fam], [fam]: total });
            alert("Berjaya dikemaskini!");
        }
    }
</script>
</body>
</html>
