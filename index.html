<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dana Family Day 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff7675; --secondary: #74b9ff; --gold: #fdcb6e; }
        body { font-family: 'Poppins', sans-serif; background: #f9f9f9; color: #2d3436; margin: 0; padding-bottom: 50px; }
        .hero { background: linear-gradient(135deg, #ff7675, #fab1a0); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .fill { height: 100%; background: var(--secondary); transition: width 1s; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border-radius: 10px; border: none; background: #eee; font-weight: 600; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        #admin-panel { display: none; margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>🎉 FAMILY DAY 2026</h1>
    <p>“Ansuran Mudah, Family Pun Bahagia”</p>
</div>

<div class="container">
    <div class="card">
        <h3>📊 LIVE TRACKER</h3>
        <div id="leaderboard">Memuatkan data...</div>
    </div>

    <div class="card">
        <h3>💰 MAKLUMAT PEMBAYARAN</h3>
        <p>Bank Islam: <b>02084010672046</b> (AYSS EMPIRE)</p>
        <div class="btn-grid">
            <button class="btn-main" onclick="window.location.href='https://wa.me/60184041383'">BAYAR SEKARANG</button>
            <button>SEMAK BAKI</button>
        </div>
    </div>

    <div class="card">
        <h3>👑 KATEGORI KELUARGA</h3>
        <p>🏆 Gold: Bayar penuh awal</p>
        <p>⭐ Silver: Bayar ikut due date</p>
        <p>💎 VIP: Bayar advance</p>
    </div>

    <!-- Panel Bendahari -->
    <div id="admin-login">
        <input type="password" id="pass" placeholder="Kod Bendahari">
        <button onclick="checkAdmin()">Masuk Panel</button>
    </div>

    <div id="admin-panel">
        <h3>🛠 Panel Bendahari</h3>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCSRS7lhcUzTnY_TlD9QWIWR5V-iNorDgI", authDomain: "familyday2026-97427.firebaseapp.com", projectId: "familyday2026-97427", storageBucket: "familyday2026-97427.firebasestorage.app", messagingSenderId: "639288774565", appId: "1:639288774565:web:9c344bd84c520c47cf224c" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("kutipan_keluarga").doc("status_bayaran").onSnapshot((doc) => {
        const data = doc.data();
        const sorted = Object.keys(data).sort((a, b) => data[b] - data[a]);
        document.getElementById('leaderboard').innerHTML = sorted.map(k => `
            <div>${k.replace(/_/g, ' ')}: <b>RM ${data[k]}</b>
            <div class="progress-bar"><div class="fill" style="width: ${Math.min((data[k]/550)*100, 100)}%"></div></div>
            </div>`).join('');
    });

    function checkAdmin() {
        if(document.getElementById('pass').value === "FamilyDay2026") {
            document.getElementById('admin-panel').style.display = "block";
            renderAdmin();
        } else { alert("Kod Salah!"); }
    }

    function renderAdmin() {
        const families = ["PAPA_LONG", "MAMA_NGAH", "MAMA_LANG", "AYAH_TAN", "IBU_MI", "PAPA_AP", "ABAH_EH", "BABAH_YAN", "PAKTAM_AFIE"];
        document.getElementById('admin-list').innerHTML = families.map(f => `
            <div style="margin-bottom:10px">
                ${f.replace(/_/g, ' ')} <input type="number" id="amt_${f}" placeholder="RM">
                <button onclick="updateFund('${f}')">Update</button>
                <button onclick="window.location.href='https://wa.me/?text=Assalamualaikum, baki ${f.replace(/_/g, ' ')} adalah RM'">WA</button>
            </div>`).join('');
    }

    async function updateFund(name) {
        const amount = parseFloat(document.getElementById('amt_' + name).value);
        await db.collection("kutipan_keluarga").doc("status_bayaran").update({ [name]: firebase.firestore.FieldValue.increment(amount) });
        alert("Berjaya!");
    }
</script>
</body>
</html>
