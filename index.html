<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dana Family Day 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--dark); margin: 0; padding: 0; }
        .hero { background: var(--dark); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--primary); }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .progress-bar { flex-grow: 1; height: 10px; background: #eee; border-radius: 5px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); }
        .btn-pay { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #admin-panel { display: none; background: #fff3e0; padding: 20px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>🎉 FAMILY DAY 2026</h1>
    <p>“Ansuran Mudah, Family Pun Bahagia”</p>
</div>

<div class="container">
    <div class="card">
        <h3><i class="fas fa-trophy"></i> LIVE LEADERBOARD</h3>
        <div id="leaderboard">Memuatkan data...</div>
    </div>

    <div class="card">
        <h3><i class="fas fa-money-bill-wave"></i> MAKLUMAT BAYARAN</h3>
        <p>Bank Islam: <b>02084010672046</b> (AYSS EMPIRE)</p>
        <button class="btn-pay" onclick="window.open('https://wa.me/60184041383')">BAYAR SEKARANG</button>
    </div>

    <div class="card">
        <input type="password" id="pass" placeholder="Kod Bendahari" style="padding: 10px;">
        <button onclick="checkAdmin()">Panel Bendahari</button>
        <div id="admin-panel"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCSRS7lhcUzTnY_TlD9QWIWR5V-iNorDgI", authDomain: "familyday2026-97427.firebaseapp.com", projectId: "familyday2026-97427", storageBucket: "familyday2026-97427.firebasestorage.app", messagingSenderId: "639288774565", appId: "1:639288774565:web:9c344bd84c520c47cf224c" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("kutipan_keluarga").doc("status_bayaran").onSnapshot((doc) => {
        const data = doc.data();
        const sorted = Object.keys(data).sort((a, b) => data[b] - data[a]);
        document.getElementById('leaderboard').innerHTML = sorted.map(k => `
            <div class="rank-item">
                <span><b>${k.replace(/_/g, ' ')}</b></span>
                <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min((data[k]/550)*100, 100)}%"></div></div>
                <span>RM ${data[k]}</span>
            </div>`).join('');
    });

    function checkAdmin() {
        if(document.getElementById('pass').value === "FamilyDay2026") {
            document.getElementById('admin-panel').style.display = "block";
            const families = ["PAPA_LONG", "MAMA_NGAH", "MAMA_LANG", "AYAH_TAN", "IBU_MI", "PAPA_AP", "ABAH_EH", "BABAH_YAN", "PAKTAM_AFIE"];
            document.getElementById('admin-panel').innerHTML = families.map(f => `
                <div style="margin:10px 0;">${f.replace(/_/g, ' ')} 
                <input type="number" id="amt_${f}" style="width:60px"> 
                <button onclick="up('${f}')">OK</button></div>`).join('');
        }
    }

    async function up(name) {
        const amt = parseFloat(document.getElementById('amt_'+name).value);
        await db.collection("kutipan_keluarga").doc("status_bayaran").update({ [name]: firebase.firestore.FieldValue.increment(amt) });
        alert("Berjaya!");
    }
</script>
</body>
</html>
