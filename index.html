<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Family Day 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎉 Family Day 2026</h2>
    <div id="display-list">Memuatkan data...</div>
    <hr>
    <h3>🔐 Panel Bendahari</h3>
    <input type="password" id="pass" placeholder="Kod Akses">
    <button onclick="checkAdmin()">Masuk</button>
    <div id="admin-panel" style="display:none;"></div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCSRS7lhcUzTnY_TlD9QWIWR5V-iNorDgI",
      authDomain: "familyday2026-97427.firebaseapp.com",
      projectId: "familyday2026-97427",
      storageBucket: "familyday2026-97427.firebasestorage.app",
      messagingSenderId: "639288774565",
      appId: "1:639288774565:web:9c344bd84c520c47cf224c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Paparan Live
    db.collection("kutipan_keluarga").doc("status_bayaran").onSnapshot((doc) => {
        const data = doc.data();
        let html = "";
        for (let family in data) {
            html += `<div class="card"><span>${family}</span> <b>RM ${data[family]}</b></div>`;
        }
        document.getElementById('display-list').innerHTML = html;
    });

    function checkAdmin() {
        if(document.getElementById('pass').value === "FamilyDay2026") {
            document.getElementById('admin-panel').style.display = "block";
            renderAdmin();
        } else { alert("Kod Salah"); }
    }

    function renderAdmin() {
        const families = ["PAPA_LONG", "MAMA_NGAH", "MAMA_LANG"]; 
        document.getElementById('admin-panel').innerHTML = families.map(f => `
            <div class="card">${f} <button class="btn" style="background:#27ae60" onclick="addFund('${f}')">+ RM50</button></div>
        `).join('');
    }

    async function addFund(name) {
        await db.collection("kutipan_keluarga").doc("status_bayaran").update({
            [name]: firebase.firestore.FieldValue.increment(50)
        });
        alert("Berjaya!");
    }
</script>
</body>
</html>
