<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Family Day 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #2d3436; margin-bottom: 5px; }
        .target { text-align: center; font-weight: bold; color: #636e72; margin-bottom: 25px; }
        .rank-card { margin-bottom: 15px; }
        .info { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 600; }
        .progress-bg { background: #dfe6e9; height: 15px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #f1c40f; transition: width 1s ease-in-out; border-radius: 10px; }
        .rank-1 .progress-fill { background: #27ae60; } /* Warna hijau untuk pendahulu */
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Leaderboard</h1>
    <p class="target">Sasaran: RM 500 sekeluarga</p>
    <div id="leaderboard">Memuatkan data...</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCSRS7lhcUzTnY_TlD9QWIWR5V-iNorDgI", authDomain: "familyday2026-97427.firebaseapp.com", projectId: "familyday2026-97427", storageBucket: "familyday2026-97427.firebasestorage.app", messagingSenderId: "639288774565", appId: "1:639288774565:web:9c344bd84c520c47cf224c" };
    firebase.initializeApp(firebaseConfig);

    firebase.firestore().collection("kutipan_keluarga").doc("status_bayaran").onSnapshot((doc) => {
        const data = doc.data();
        const sorted = Object.keys(data).sort((a, b) => data[b] - data[a]);
        const target = 500; // Tetapkan sasaran RM500

        document.getElementById('leaderboard').innerHTML = sorted.map((k, index) => {
            const percentage = Math.min((data[k] / target) * 100, 100);
            const rankClass = index === 0 ? 'rank-1' : '';
            return `
                <div class="rank-card ${rankClass}">
                    <div class="info"><span>${index + 1}. ${k.replace(/_/g, ' ')}</span> <span>RM ${data[k].toFixed(0)}</span></div>
                    <div class="progress-bg"><div class="progress-fill" style="width: ${percentage}%"></div></div>
                </div>
            `;
        }).join('');
    });
</script>
</body>
</html>
